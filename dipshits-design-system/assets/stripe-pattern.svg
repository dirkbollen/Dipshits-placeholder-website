<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Diagonal stripe pattern tile">
  <defs>
    <pattern id="diag" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect x="0" y="0" width="20" height="40" fill="#FF2D8F"></rect>
      <rect x="20" y="0" width="20" height="40" fill="#14C4B9"></rect>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#diag)"></rect>
