<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dipshits — please don't contact us</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sigmar&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--hot-pink);
    /* subtle halftone dot pattern in yellow on top of pink for vibrance */
    background-image: radial-gradient(var(--electric-yellow) 12%, transparent 14%);
    background-size: 36px 36px;
    color: var(--ink);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .stage {
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto auto auto 1fr auto;
    align-items: center;
    justify-items: center;
    padding: 48px 24px 0;
    text-align: center;
    position: relative;
  }

  /* DIPSHITS wordmark */
  .wm {
    font-family: 'Sigmar', 'Bagel Fat One', system-ui, sans-serif;
    font-size: clamp(64px, 12vw, 180px);
    line-height: 0.95;
    letter-spacing: 0.005em;
    margin: 0;
    color: var(--electric-yellow);
    text-shadow:
      6px 6px 0 var(--ink),
      12px 12px 0 var(--royal-blue);
    transform: rotate(-2deg);
  }

  /* chip illustration — yellow with chunky outline + offset shadow */
  .chip {
    margin: 6vh 0 4vh;
    width: clamp(180px, 22vw, 280px);
    height: auto;
    filter: drop-shadow(6px 6px 0 var(--ink));
    transform: rotate(-8deg);
    animation: bob 4s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: rotate(-8deg) translateY(0); }
    50%      { transform: rotate(-6deg) translateY(-10px); }
  }

  /* copy block */
  .line {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.8vw, 56px);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--tortilla);
    text-shadow: 3px 3px 0 var(--ink);
    margin: 0;
  }

  .btn {
    margin: 18px 0;
    font-family: var(--font-display);
    font-size: clamp(20px, 2.4vw, 36px);
    text-transform: uppercase;
    letter-spacing: 0.01em;
    color: var(--ink);
    background: var(--electric-yellow);
    border: 4px solid var(--ink);
    border-radius: 999px;
    padding: 14px 32px;
    cursor: pointer;
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 160ms;
    text-decoration: none;
    display: inline-block;
  }
  .btn:hover {
    transform: translate(-2px, -2px) rotate(-2deg);
    box-shadow: 9px 9px 0 var(--ink);
  }
  .btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }

  /* serape stripe footer */
  .serape {
    width: 100%;
    height: 22px;
    background: repeating-linear-gradient(90deg,
      var(--mango) 0 40px,
      var(--electric-yellow) 40px 80px,
      var(--lime) 80px 120px,
      var(--royal-blue) 120px 160px,
      var(--hot-pink) 160px 200px,
      var(--grape) 200px 240px);
    border-top: 4px solid var(--ink);
    grid-row: 6;
    align-self: end;
    justify-self: stretch;
  }

  /* tiny floating stickers for vibrance */
  .sticker {
    position: absolute;
    width: 110px; height: 110px; border-radius: 999px;
    border: 4px solid var(--ink); box-shadow: 5px 5px 0 var(--ink);
    display: flex; align-items: center; justify-content: center; text-align: center;
    font-family: var(--font-display); text-transform: uppercase;
    font-size: 18px; line-height: 0.95;
  }
  .sticker.tl { top: 36px; left: 36px; background: var(--lime); color: var(--ink); transform: rotate(-12deg); }
  .sticker.tr { top: 36px; right: 36px; background: var(--royal-blue); color: var(--electric-yellow); transform: rotate(10deg); }
</style>
</head>
<body data-screen-label="Placeholder — landing">
  <div class="stage">
    <div></div>

    <h1 class="wm">DIPSHITS</h1>

    <img class="chip" src="assets/chip-illustration.svg" alt="Vibrant yellow tortilla chip"/>

    <div>
      <p class="line">Please don't</p>
      <a class="btn" href="mailto:hi@dipshits.party">Contact us</a>
      <p class="line">us</p>
    </div>

    <div></div>

    <div class="serape"></div>
  </div>
</body>
</html>
